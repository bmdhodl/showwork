name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux, x64, pc]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create isolated Python environment
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install showwork and test runner
        run: .venv/bin/python -m pip install -e . pytest

      - name: Run behavioral and conformance tests
        run: .venv/bin/python scripts/run_tests.py

      - name: Verify the committed genesis receipt
        run: .venv/bin/showwork verify --session genesis --no-report
