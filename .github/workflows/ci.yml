name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, linux, x64, pc]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create isolated Python environment
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install showwork and test runner
        run: .venv/bin/python -m pip install -e . pytest

      - name: Run behavioral and conformance tests
        run: .venv/bin/python scripts/run_tests.py

      - name: Verify the committed genesis receipt
        run: .venv/bin/showwork verify --session genesis --no-report

  conformance-js:
    runs-on: [self-hosted, linux, x64, pc]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: JS auditor must match the frozen chain fixtures
        run: node js/showwork-audit/test.mjs

  receipts:
    runs-on: [self-hosted, linux, x64, pc]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Gate on the repo's own receipts (chain audit + phase-1 session)
        uses: ./actions/verify
        with:
          session: v02-phase-1
          # allow-commands stays false: this doubles as a live demonstration
          # of fork-safe mode - the suite's command claim reports the policy
          # error honestly and the gate tolerates YELLOW unless strict.
